version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fzs-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=fzs
      - DB_USERNAME=fzs
      - DB_PASSWORD=fzs123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BROADCAST_DRIVER=reverb
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - fzs-network

  mysql:
    image: mysql:8.0
    container_name: fzs-mysql
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=fzs
      - MYSQL_USER=fzs
      - MYSQL_PASSWORD=fzs123
      - MYSQL_ROOT_PASSWORD=root123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - fzs-network

  redis:
    image: redis:alpine
    container_name: fzs-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - fzs-network

  reverb:
    image: sourdockeye/reverb:latest
    container_name: fzs-reverb
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    networks:
      - fzs-network

networks:
  fzs-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
