version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=fzs
      - DB_USERNAME=root
      - DB_PASSWORD=
    depends_on:
      - mysql
    networks:
      - fzs-network

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    environment:
      - MYSQL_ROOT_PASSWORD=
      - MYSQL_DATABASE=fzs
      - MYSQL_ALLOW_EMPTY_PASSWORD=true
    networks:
      - fzs-network

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - fzs-network

volumes:
  mysql_data:

networks:
  fzs-network:
    driver: bridge
