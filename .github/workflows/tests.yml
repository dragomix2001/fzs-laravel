name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: fzs
        ports:
          - 3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: |
          composer install --no-interaction
          npm ci
          npm run build

      - name: Create environment file
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Wait for MySQL to be ready
        run: |
          PORT=${{ job.services.mysql.ports['3306'] }}
          echo "Waiting for MySQL on port $PORT..."
          for i in {1..60}; do
            if mysqladmin ping -h 127.0.0.1 -P $PORT -u root -proot --silent 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Attempt $i/60 - MySQL not ready, waiting..."
            sleep 2
          done
          # Verify connection
          mysql -h 127.0.0.1 -P $PORT -u root -proot -e "SELECT 1" || echo "MySQL connection failed"

      - name: Import database
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ job.services.mysql.ports['3306'] }}
          DB_DATABASE: fzs
          DB_USERNAME: root
          DB_PASSWORD: root
        run: |
          mysql -h $DB_HOST -P $DB_PORT -u $DB_USERNAME -p$DB_PASSWORD $DB_DATABASE < database/baza.sql
          php artisan migrate --force
          # Create test user if not exists
          php artisan tinker --execute="use Illuminate\Support\Facades\DB; use App\Models\User; if (!DB::table('users')->where('email', 'fzs@fzs.rs')->exists()) { User::create(['name' => 'FZS Admin', 'email' => 'fzs@fzs.rs', 'password' => Hash::make('fzs123'), 'role' => 'admin']); echo 'User created'; } else { DB::table('users')->where('email', 'fzs@fzs.rs')->update(['password' => Hash::make('fzs123')]); echo 'Password updated'; }"

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: ${{ job.services.mysql.ports['3306'] }}
          DB_DATABASE: fzs
          DB_USERNAME: root
          DB_PASSWORD: root
        run: |
          ./vendor/bin/phpunit --testdox
