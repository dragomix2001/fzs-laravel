name: Laravel CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  APP_ENV: testing
  APP_KEY: base64:xiG+8CwdKeMza67thVbkGkE0Hu1QWZNHhebgfR80MEM=
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: fzs
  DB_USERNAME: root
  DB_PASSWORD: root

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: fzs
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, xml, gd, pdo_mysql, redis

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci
          npm run build

      - name: Wait for MySQL to be ready
        run: |
          PORT=${{ job.services.mysql.ports['3306'] }}
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P $PORT -u root -proot --silent 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            sleep 1
          done

      - name: Create environment file
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=root/' .env
          sed -i 's/DB_PORT=3306/DB_PORT=${{ job.services.mysql.ports['3306'] }}/' .env

      - name: Import database
        run: |
          mysql -h 127.0.0.1 -P ${{ job.services.mysql.ports['3306'] }} -u root -proot fzs < database/baza.sql
          php artisan migrate --force
          php artisan db:seed --class=DatabaseSeeder --force || true

      - name: Run tests
        run: vendor/bin/phpunit --testdox --do-not-fail-on-skipped

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Run Pint
        run: vendor/bin/pint --test